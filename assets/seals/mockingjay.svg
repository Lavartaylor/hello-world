<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" stroke-width="3"/>
  <circle cx="100" cy="100" r="86"/>
  <!-- Mockingjay in flight, arrow in beak -->
  <g fill="currentColor" stroke-width="1.6">
    <!-- Body -->
    <path d="M100 60 C 92 70 88 90 92 110 L 96 130 L 100 138 L 104 130 L 108 110 C 112 90 108 70 100 60 Z" fill-opacity="0.95"/>
    <!-- Head -->
    <circle cx="100" cy="62" r="7" fill-opacity="0.95"/>
    <!-- Eye -->
    <circle cx="102" cy="60" r="1.2" fill="var(--paper, #efe5c5)" stroke="none"/>
    <!-- Arrow through beak -->
    <g stroke-width="2.2" fill="none">
      <path d="M70 58 L 140 58"/>
      <!-- Fletching -->
      <path d="M70 58 L 64 53 M70 58 L 64 63 M74 58 L 68 53 M74 58 L 68 63"/>
      <!-- Arrowhead -->
      <path d="M140 58 L 132 53 L 134 58 L 132 63 Z" fill="currentColor"/>
    </g>
    <!-- Left wing extended -->
    <path d="M92 80 C 70 78 50 92 38 110 C 56 102 72 100 88 108 L 92 100 Z" fill-opacity="0.92"/>
    <path d="M88 108 C 72 116 60 130 54 148 C 70 138 82 130 94 124 L 96 116 Z" fill-opacity="0.85"/>
    <!-- Right wing extended -->
    <path d="M108 80 C 130 78 150 92 162 110 C 144 102 128 100 112 108 L 108 100 Z" fill-opacity="0.92"/>
    <path d="M112 108 C 128 116 140 130 146 148 C 130 138 118 130 106 124 L 104 116 Z" fill-opacity="0.85"/>
    <!-- Tail feathers -->
    <path d="M96 130 L 90 158 L 100 150 L 110 158 L 104 130 Z" fill-opacity="0.9"/>
  </g>
</svg>
