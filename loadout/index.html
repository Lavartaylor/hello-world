<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Arena Loadout — 75th Hunger Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Special+Elite&family=IM+Fell+English:ital@0;1&family=Barlow+Condensed:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/components.css">
  <style>
    .loadout-stack {
      width: min(560px, 100%);
      margin: var(--sp-4) auto 0;
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
    .loadout-item {
      background: rgba(0, 14, 30, 0.55);
      border: 1.5px solid rgba(255, 220, 120, 0.25);
      padding: var(--sp-4);
      color: #fff8e0;
      font-family: var(--font-utility);
      text-shadow:
        -1px 0 rgba(0, 0, 0, 0.85),
        1px 0 rgba(0, 0, 0, 0.85),
        0 -1px rgba(0, 0, 0, 0.85),
        0 1px rgba(0, 0, 0, 0.85);
    }
    .loadout-item__head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--sp-3);
      margin-bottom: 6px;
    }
    .loadout-item__name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #fff8e0;
    }
    .loadout-item__cost {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.2rem;
      color: #ffd870;
      letter-spacing: 0;
      text-shadow:
        0 1px 0 rgba(0, 0, 0, 0.85),
        0 0 10px rgba(255, 216, 112, 0.4);
    }
    .loadout-item__desc {
      font-size: 0.85rem;
      font-weight: 500;
      color: #ffe4a0;
      line-height: 1.4;
      margin-bottom: var(--sp-3);
    }
    .loadout-item__bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
    }
    .loadout-item__owned {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #d4b870;
      letter-spacing: 0.04em;
    }
    .loadout-item__owned strong { color: #86e870; font-weight: 800; }
    .loadout-buy {
      padding: 8px 18px;
      background: linear-gradient(180deg, #3a3530 0%, #2a2622 50%, #1a1714 100%);
      border: 1px solid rgba(255, 220, 120, 0.5);
      color: #ffd870;
      font-family: var(--font-utility);
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.85);
    }
    .loadout-buy:hover { background: linear-gradient(180deg, #45403a, #322d28); color: #fff8e0; }
    .loadout-buy:disabled { opacity: 0.4; cursor: default; }

    .loadout-inventory {
      background: rgba(40, 30, 0, 0.5);
      border: 1.5px solid rgba(255, 216, 112, 0.4);
      padding: var(--sp-4);
      margin-bottom: var(--sp-3);
    }
    .loadout-inventory__head {
      font-family: var(--font-utility);
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: #d4b870;
      letter-spacing: 0.04em;
      margin-bottom: var(--sp-2);
    }
    .loadout-inventory__list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .loadout-tag {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 216, 112, 0.45);
      padding: 4px 10px;
      font-family: var(--font-utility);
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #ffd870;
      letter-spacing: 0.04em;
    }
    .loadout-empty {
      font-family: var(--font-utility);
      font-style: italic;
      font-size: 0.85rem;
      color: rgba(255, 248, 224, 0.5);
    }
  </style>
</head>
<body class="broadcast" data-role="capitol">

  <div class="crt">
    <div class="crt__scrim"></div><div class="crt__static"></div><div class="crt__scanlines"></div>
    <div class="crt__vignette"></div><div class="crt__flicker"></div><div class="crt__bootflash"></div>
  </div>

  <div class="broadcast-layout">
    <header class="broadcast-header">
      <span class="broadcast-header__channel">ARENA · LOADOUT SHOP</span>
      <div class="broadcast-hud" id="hud" hidden>
        <div class="broadcast-hud__row">
          <span class="broadcast-hud__label">Citizen</span>
          <span class="broadcast-hud__value" id="hud-name">—</span>
        </div>
        <div class="broadcast-hud__row broadcast-hud__row--points">
          <span class="broadcast-hud__label">Credits</span>
          <span class="broadcast-hud__value" id="hud-credits">0</span>
        </div>
      </div>
    </header>

    <main class="broadcast-main">
      <div id="content"><p class="admin-empty">Loading transmission…</p></div>
    </main>
  </div>

  <script type="module">
    import { ensureAudioReady, dingBell } from "/scripts/audio.js";
    import {
      fetchTribute, fetchLoadoutItems, fetchLoadoutForTribute,
      buyLoadoutItem, fetchEventStateFlag
    } from "/scripts/supabase.js";
    import { getSlug } from "/scripts/data.js";

    let tribute = null;
    let items = [];
    let inventory = [];

    function renderEmpty(msg) {
      document.getElementById("content").innerHTML = `
        <div style="text-align:center;padding-top:var(--sp-6);">
          <h1 class="screen-form__title">Arena Loadout</h1>
          <p style="font-family:var(--font-utility);font-weight:600;font-size:1rem;color:#ffe4a0;margin:var(--sp-4) auto;max-width:38ch;line-height:1.4;text-shadow:0 1px 0 rgba(0,0,0,0.85);">${msg}</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:var(--sp-4);">
            <a class="key key--small is-ready" href="/loadout/demo" style="text-decoration:none;">Demo</a>
          </div>
        </div>
      `;
    }

    async function refreshTribute() {
      tribute = await fetchTribute(tribute.slug);
      document.getElementById("hud-credits").textContent = (tribute.credits ?? 0).toLocaleString();
    }

    function ownedCount(itemId) {
      return inventory.filter(p => p.item_id === itemId).length;
    }

    async function run() {
      const slug = getSlug();
      tribute = slug ? await fetchTribute(slug) : null;
      if (!tribute) return renderEmpty("No citizen detected. Use the personal link the Gamemakers sent you.");

      document.getElementById("hud").hidden = false;
      document.getElementById("hud-name").textContent = tribute.name.toUpperCase();
      document.getElementById("hud-credits").textContent = (tribute.credits ?? 0).toLocaleString();

      const [itemsData, inv, lockFlag] = await Promise.all([
        fetchLoadoutItems(),
        fetchLoadoutForTribute(tribute.slug),
        fetchEventStateFlag("loadout_locked")
      ]);
      items = itemsData;
      inventory = inv;

      const isLocked = lockFlag?.value === "true";
      renderShop(isLocked);
    }

    function renderShop(isLocked) {
      const root = document.getElementById("content");
      const inventoryHtml = inventory.length
        ? `<div class="loadout-inventory__list">${
            items.map(i => {
              const c = ownedCount(i.id);
              return c ? `<span class="loadout-tag">${i.name}${c > 1 ? ` × ${c}` : ""}</span>` : "";
            }).filter(Boolean).join("")
          }</div>`
        : `<p class="loadout-empty">Nothing purchased yet.</p>`;

      root.innerHTML = `
        <div class="loadout-stack">
          <div style="text-align:center;">
            <div style="font-family:var(--font-utility);font-weight:700;font-size:0.85rem;color:#d4b870;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--sp-2);">Halloween Night · The Arena</div>
            <h1 class="screen-form__title" style="font-size:clamp(1.8rem,7vw,2.6rem);">Buy Your Loadout</h1>
            <p style="font-family:var(--font-utility);font-weight:600;font-size:0.9rem;color:#ffe4a0;max-width:42ch;margin:var(--sp-3) auto;line-height:1.4;text-shadow:0 1px 0 rgba(0,0,0,0.85);">
              Spend your credits on equipment for the laser tag arena.
              ${isLocked ? '<br><span style="color:#ff7070;font-weight:700;">🔒 LOADOUT LOCKED — Arena round is starting.</span>' : '<br><span style="color:#ffd870;">Locks when the announcer says so.</span>'}
            </p>
          </div>

          <div class="loadout-inventory">
            <div class="loadout-inventory__head">Your loadout</div>
            ${inventoryHtml}
          </div>

          ${items.map(item => {
            const owned = ownedCount(item.id);
            const atMax = item.max_per_tribute != null && owned >= item.max_per_tribute;
            const canAfford = (tribute.credits ?? 0) >= item.cost;
            const disabled = isLocked || atMax || !canAfford;
            const reason = isLocked ? "Locked"
                         : atMax ? "Max reached"
                         : !canAfford ? "Need more credits"
                         : "Buy";
            return `
              <div class="loadout-item" data-item-id="${item.id}">
                <div class="loadout-item__head">
                  <div class="loadout-item__name">${item.name}</div>
                  <div class="loadout-item__cost">${item.cost}</div>
                </div>
                <div class="loadout-item__desc">${item.description}</div>
                <div class="loadout-item__bottom">
                  <div class="loadout-item__owned">
                    Owned: <strong>${owned}</strong>${item.max_per_tribute ? ` / ${item.max_per_tribute}` : ""}
                  </div>
                  <button class="loadout-buy" ${disabled ? "disabled" : ""} data-action="buy">${reason}</button>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;

      root.querySelectorAll(".loadout-item").forEach(row => {
        const btn = row.querySelector("[data-action='buy']");
        if (!btn || btn.disabled) return;
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          btn.textContent = "Buying…";
          try {
            await buyLoadoutItem({ tribute_slug: tribute.slug, item_id: row.dataset.itemId });
            dingBell({ volume: 0.08 });
            // Refresh state and re-render
            const [tr, inv] = await Promise.all([
              fetchTribute(tribute.slug),
              fetchLoadoutForTribute(tribute.slug)
            ]);
            tribute = tr;
            inventory = inv;
            document.getElementById("hud-credits").textContent = (tribute.credits ?? 0).toLocaleString();
            const lockFlag = await fetchEventStateFlag("loadout_locked");
            renderShop(lockFlag?.value === "true");
          } catch (err) {
            console.error(err);
            btn.textContent = `Failed: ${err.message || "try again"}`;
            setTimeout(() => { btn.disabled = false; btn.textContent = "Buy"; }, 2500);
          }
        });
      });
    }

    ensureAudioReady();
    run().catch(err => { console.error(err); renderEmpty("Transmission error — check console."); });
  </script>
</body>
</html>
