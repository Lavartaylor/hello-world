<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>The Cornucopia — 75th Hunger Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Special+Elite&family=IM+Fell+English:ital@0;1&family=Barlow+Condensed:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/components.css">
  <style>
    .weapon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--sp-3);
      width: min(560px, 100%);
      margin: var(--sp-4) auto 0;
    }
    .weapon-card {
      background: rgba(0, 14, 30, 0.55);
      border: 1.5px solid rgba(255, 220, 120, 0.25);
      padding: var(--sp-4) var(--sp-3);
      text-align: center;
      cursor: pointer;
      font-family: var(--font-utility);
      color: #fff8e0;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      text-shadow:
        -1px 0 rgba(0, 0, 0, 0.85),
        1px 0 rgba(0, 0, 0, 0.85),
        0 -1px rgba(0, 0, 0, 0.85),
        0 1px rgba(0, 0, 0, 0.85);
    }
    .weapon-card:hover {
      border-color: rgba(255, 216, 112, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    }
    .weapon-card.is-locked {
      border-color: #ffd870;
      background: rgba(40, 30, 0, 0.55);
      box-shadow: 0 0 24px rgba(255, 216, 112, 0.3);
    }
    .weapon-card__icon {
      font-size: 2.5rem;
      line-height: 1;
      margin-bottom: var(--sp-3);
      display: block;
    }
    .weapon-card__name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }
    .weapon-card__game {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #d4b870;
      letter-spacing: 0.04em;
    }
    .weapon-card__status {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: var(--sp-2);
      color: #86e870;
    }
    .weapon-card.is-stub { opacity: 0.6; cursor: not-allowed; }
    .weapon-card.is-stub .weapon-card__status { color: #ff8b6e; }

    /* Tower game canvas */
    .tower-stage {
      width: min(420px, 96vw);
      margin: var(--sp-4) auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
    }
    .tower-canvas {
      width: 100%;
      aspect-ratio: 3 / 4;
      background:
        linear-gradient(180deg, rgba(0,30,60,0.4) 0%, rgba(0,10,30,0.7) 100%);
      border: 1.5px solid rgba(255, 220, 120, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 60px rgba(0,0,0,0.4);
      display: block;
      cursor: pointer;
      touch-action: manipulation;
    }
    .tower-hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-family: var(--font-utility);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff8e0;
      text-shadow: 0 1px 0 rgba(0,0,0,0.85);
    }
    .tower-hud__value {
      font-family: var(--font-display);
      font-weight: 800;
      color: #ffd870;
      font-size: 1.4rem;
    }
    .tower-button {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff8e0;
      background: linear-gradient(180deg, #3a3530 0%, #2a2622 50%, #1a1714 100%);
      border: 1px solid rgba(255, 220, 120, 0.4);
      padding: 12px 32px;
      cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255, 240, 200, 0.18),
        inset 0 -1px 0 rgba(0, 0, 0, 0.55),
        0 3px 0 #0a0908;
      width: 100%;
      max-width: 280px;
    }
    .tower-button:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 1px 0 rgba(255, 240, 200, 0.12),
        inset 0 -1px 0 rgba(0, 0, 0, 0.55),
        0 1px 0 #0a0908;
    }
    .tower-msg {
      font-family: var(--font-utility);
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      color: #ffe4a0;
      letter-spacing: 0.02em;
      text-align: center;
      min-height: 1.4em;
    }
  </style>
</head>
<body class="broadcast" data-role="capitol">

  <div class="crt">
    <div class="crt__scrim"></div>
    <div class="crt__static"></div>
    <div class="crt__scanlines"></div>
    <div class="crt__vignette"></div>
    <div class="crt__flicker"></div>
    <div class="crt__bootflash"></div>
  </div>

  <div class="broadcast-layout">
    <header class="broadcast-header">
      <span class="broadcast-header__channel">CH-W1 · THE CORNUCOPIA</span>
      <div class="broadcast-hud" id="hud" hidden>
        <div class="broadcast-hud__row">
          <span class="broadcast-hud__label">Citizen</span>
          <span class="broadcast-hud__value" id="hud-name">—</span>
        </div>
        <div class="broadcast-hud__row broadcast-hud__row--points">
          <span class="broadcast-hud__label">Best Score</span>
          <span class="broadcast-hud__value" id="hud-best">—</span>
        </div>
      </div>
    </header>

    <main class="broadcast-main">
      <div id="content"><p class="admin-empty">Loading transmission…</p></div>
    </main>
  </div>

  <script type="module">
    import { ensureAudioReady, dingBell } from "/scripts/audio.js";
    import {
      fetchTribute, fetchWeaponChoice, chooseWeapon,
      submitWeaponScore, fetchBestWeaponScore
    } from "/scripts/supabase.js";
    import { getSlug } from "/scripts/data.js";

    const WEAPONS = [
      { id: "bow",       name: "Bow",       game: "Archery",         icon: "🏹", playable: true },
      { id: "slingshot", name: "Slingshot", game: "Trajectory",      icon: "🎯", playable: true },
      { id: "knife",     name: "Knife",     game: "Spinning Target", icon: "🔪", playable: true },
      { id: "net",       name: "Net",       game: "Catch",           icon: "🕸️", playable: true },
      { id: "tower",     name: "Tower",     game: "Falling Blocks",  icon: "🧱", playable: true }
    ];
    const WEEK = 1;
    let tribute = null;

    function renderEmpty(msg) {
      document.getElementById("content").innerHTML = `
        <div style="text-align:center;padding-top:var(--sp-6);">
          <h1 class="screen-form__title">The Cornucopia</h1>
          <p style="font-family:var(--font-utility);font-weight:600;font-size:1rem;color:#ffe4a0;margin:var(--sp-4) auto;max-width:36ch;line-height:1.4;text-shadow:0 1px 0 rgba(0,0,0,0.85);">${msg}</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:var(--sp-4);">
            <a class="key key--small is-ready" href="/challenge/w1/lavar" style="text-decoration:none;">LaVar</a>
            <a class="key key--small is-ready" href="/challenge/w1/rachel" style="text-decoration:none;">Rachel</a>
            <a class="key key--small is-ready" href="/challenge/w1/demo" style="text-decoration:none;">Demo</a>
          </div>
        </div>
      `;
    }

    async function run() {
      const slug = getSlug();
      tribute = slug ? await fetchTribute(slug) : null;
      if (!tribute) {
        renderEmpty("No citizen detected. Use the personal link the Gamemakers sent you.");
        return;
      }

      document.getElementById("hud").hidden = false;
      document.getElementById("hud-name").textContent = tribute.name.toUpperCase();

      const choice = await fetchWeaponChoice(tribute.slug);
      if (!choice) {
        renderPicker();
      } else {
        const best = await fetchBestWeaponScore(tribute.slug, WEEK);
        document.getElementById("hud-best").textContent = best ? best.score : "—";
        renderGame(choice.weapon, best?.score ?? 0);
      }
    }

    function renderPicker() {
      const root = document.getElementById("content");
      root.innerHTML = `
        <div style="text-align:center;">
          <div style="font-family:var(--font-utility);font-weight:700;font-size:0.85rem;color:#d4b870;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--sp-2);">Week 1 · The Cornucopia</div>
          <h1 class="screen-form__title" style="font-size:clamp(1.8rem, 7vw, 3rem);">Pick Your Weapon</h1>
          <p style="font-family:var(--font-utility);font-weight:600;font-size:0.95rem;color:#ffe4a0;margin:var(--sp-3) auto var(--sp-2);max-width:38ch;line-height:1.4;text-shadow:0 1px 0 rgba(0,0,0,0.85);">
            Your weapon is locked for the entire event. You'll use it in Week 1's mini-game and in the Final Bracket on Week 5. Choose wisely.
          </p>
          <div class="weapon-grid" id="weapon-grid">
            ${WEAPONS.map(w => `
              <button class="weapon-card ${w.playable ? "" : "is-stub"}" data-weapon="${w.id}" ${w.playable ? "" : "disabled"}>
                <span class="weapon-card__icon">${w.icon}</span>
                <div class="weapon-card__name">${w.name}</div>
                <div class="weapon-card__game">${w.game}</div>
                <div class="weapon-card__status">${w.playable ? "Playable" : "Coming soon"}</div>
              </button>
            `).join("")}
          </div>
          <p style="font-family:var(--font-utility);font-weight:500;font-size:0.75rem;color:#ad8a40;text-transform:uppercase;letter-spacing:0.04em;margin-top:var(--sp-5);">
            Only Tower is live right now. Other weapons unlock as Gamemakers build them.
          </p>
        </div>
      `;

      root.querySelectorAll(".weapon-card[data-weapon]:not(.is-stub)").forEach(card => {
        card.addEventListener("click", async () => {
          const weaponId = card.dataset.weapon;
          if (!confirm(`Lock in ${WEAPONS.find(w => w.id === weaponId).name}? This cannot be changed.`)) return;
          card.classList.add("is-locked");
          try {
            await chooseWeapon(tribute.slug, weaponId);
            renderGame(weaponId, 0);
          } catch (err) {
            console.error(err);
            alert("Failed to lock in. Try again.");
            card.classList.remove("is-locked");
          }
        });
      });
    }

    function renderGame(weapon, currentBest) {
      const MOUNTS = { tower: mountTower, bow: mountBow, slingshot: mountSlingshot, knife: mountKnife, net: mountNet };
      const fn = MOUNTS[weapon];
      if (!fn) {
        document.getElementById("content").innerHTML = `<p class="admin-empty">Unknown weapon. Contact the Gamemakers.</p>`;
        return;
      }
      fn(currentBest);
    }

    // Shared helper — build a standard game shell with HUD + canvas + buttons
    function gameShell({ title, hint, currentBest, buttonLabel = "Start" }) {
      const root = document.getElementById("content");
      root.innerHTML = `
        <div class="tower-stage">
          <div style="text-align:center;">
            <h1 class="screen-form__title" style="font-size:clamp(1.5rem,5vw,2.2rem);">${title}</h1>
            <p style="font-family:var(--font-utility);font-weight:600;font-size:0.85rem;color:#ffe4a0;margin-top:4px;text-shadow:0 1px 0 rgba(0,0,0,0.85);">${hint}</p>
          </div>
          <div class="tower-hud">
            <div>Score: <span class="tower-hud__value" id="g-score">0</span></div>
            <div>Best: <span class="tower-hud__value" id="g-best">${currentBest}</span></div>
          </div>
          <canvas class="tower-canvas" id="g-canvas"></canvas>
          <div class="tower-msg" id="g-msg">Tap to begin</div>
          <button class="tower-button" id="g-action">${buttonLabel}</button>
        </div>
      `;
      const canvas = document.getElementById("g-canvas");
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { W: rect.width, H: rect.height };
      }
      const dim = resize();
      window.addEventListener("resize", resize);
      return {
        canvas, ctx,
        W: dim.W, H: dim.H,
        score: document.getElementById("g-score"),
        best: document.getElementById("g-best"),
        msg: document.getElementById("g-msg"),
        action: document.getElementById("g-action")
      };
    }

    function recordScore(weapon, score) {
      submitWeaponScore({ slug: tribute.slug, weapon, score, week: WEEK }).catch(err => console.error("Score submit failed:", err));
    }

    // ====================================================================
    // BOW — Drag bow back to set power, release to fire arrow at bullseye.
    // 5 arrows per run, scored 100/80/60/40/20/0 by ring.
    // ====================================================================
    function mountBow(currentBest) {
      const ui = gameShell({ title: "The Bow", hint: "Drag back from the bow, release to fire. 5 arrows.", currentBest });
      let { W, H, score: scoreEl, best: bestEl, msg, action, canvas, ctx } = ui;
      let arrowsLeft = 0, score = 0, best = currentBest, running = false, raf = null;
      let drag = null;        // {sx,sy,x,y}
      let arrow = null;       // {x,y,vx,vy}
      let lastHit = null;     // {ring, points}
      let wind = 0;

      function reset() {
        score = 0; arrowsLeft = 5; lastHit = null;
        scoreEl.textContent = 0;
        msg.textContent = "5 arrows. Drag from the bow and release.";
        wind = (Math.random() - 0.5) * 0.4;
        arrow = null; drag = null;
        running = true;
        action.textContent = "Reset";
        loop();
      }

      function bowX() { return 80; }
      function bowY() { return H / 2; }
      function targetX() { return W - 70; }
      function targetY() { return H / 2; }

      function loop() {
        if (!running) return;
        ctx.clearRect(0, 0, W, H);

        // wind arrow indicator
        ctx.fillStyle = "rgba(255, 216, 112, 0.5)";
        ctx.font = "12px monospace";
        ctx.fillText(`Wind: ${wind > 0 ? "→" : "←"} ${Math.abs(wind).toFixed(2)}`, 8, 16);

        // target rings
        const rings = [{ r: 60, c: "#1a4a8a", p: 20 },
                       { r: 48, c: "#1a8aa8", p: 40 },
                       { r: 36, c: "#c8c8a0", p: 60 },
                       { r: 24, c: "#e8a020", p: 80 },
                       { r: 12, c: "#e84040", p: 100 }];
        for (const r of rings) {
          ctx.fillStyle = r.c;
          ctx.beginPath();
          ctx.arc(targetX(), targetY(), r.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,0.4)";
          ctx.stroke();
        }

        // bow
        ctx.strokeStyle = "#e8d49a";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(bowX(), bowY(), 30, -Math.PI/2, Math.PI/2);
        ctx.stroke();

        // drag line
        if (drag) {
          ctx.strokeStyle = "#ffd870";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(bowX(), bowY());
          ctx.lineTo(drag.x, drag.y);
          ctx.stroke();
          ctx.fillStyle = "#ffd870";
          ctx.beginPath();
          ctx.arc(drag.x, drag.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }

        // arrow in flight
        if (arrow) {
          arrow.vx += 0;
          arrow.x += arrow.vx;
          arrow.y += arrow.vy + (wind * 2);
          arrow.vy += 0.12; // gravity
          ctx.strokeStyle = "#fff8e0";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(arrow.x - 10, arrow.y);
          ctx.lineTo(arrow.x, arrow.y);
          ctx.stroke();

          // check target hit / miss
          const dx = arrow.x - targetX(), dy = arrow.y - targetY();
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (arrow.x > targetX() - 5 || arrow.x > W || arrow.y > H || arrow.y < 0) {
            let pts = 0;
            for (let i = rings.length - 1; i >= 0; i--) {
              if (dist <= rings[i].r) { pts = rings[i].p; break; }
            }
            score += pts;
            lastHit = pts;
            arrowsLeft--;
            arrow = null;
            scoreEl.textContent = score;
            msg.textContent = `Arrow: +${pts}. ${arrowsLeft} left.`;
            if (arrowsLeft <= 0) endRun();
            wind = (Math.random() - 0.5) * 0.4;
          }
        }

        raf = requestAnimationFrame(loop);
      }

      function endRun() {
        running = false;
        cancelAnimationFrame(raf);
        if (score > best) { best = score; bestEl.textContent = best; }
        msg.textContent = `Run complete. ${score} pts. Tap Reset.`;
        action.textContent = "Reset";
        recordScore("bow", score);
      }

      function getPoint(e) {
        const rect = canvas.getBoundingClientRect();
        const t = (e.touches && e.touches[0]) ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
      }

      function dragStart(e) {
        if (!running || arrow || arrowsLeft <= 0) return;
        const p = getPoint(e);
        if (Math.hypot(p.x - bowX(), p.y - bowY()) > 80) return;
        drag = { sx: bowX(), sy: bowY(), x: p.x, y: p.y };
      }
      function dragMove(e) {
        if (!drag) return;
        e.preventDefault?.();
        const p = getPoint(e);
        drag.x = p.x; drag.y = p.y;
      }
      function dragEnd() {
        if (!drag) return;
        const dx = bowX() - drag.x, dy = bowY() - drag.y;
        const power = Math.min(20, Math.hypot(dx, dy) / 8);
        arrow = { x: bowX(), y: bowY(), vx: dx / 6 + power * 0.6, vy: dy / 6 };
        drag = null;
      }

      canvas.addEventListener("mousedown", dragStart);
      canvas.addEventListener("mousemove", dragMove);
      canvas.addEventListener("mouseup", dragEnd);
      canvas.addEventListener("touchstart", dragStart, { passive: false });
      canvas.addEventListener("touchmove", dragMove, { passive: false });
      canvas.addEventListener("touchend", dragEnd);
      action.addEventListener("click", reset);
      reset();
    }

    // ====================================================================
    // SLINGSHOT — Tap arc launcher. Tap at apex of swing to release.
    // 10 shots at swinging target. Score by hits + accuracy.
    // ====================================================================
    function mountSlingshot(currentBest) {
      const ui = gameShell({ title: "The Slingshot", hint: "Tap to launch. Hit the bouncing target.", currentBest });
      let { W, H, score: scoreEl, best: bestEl, msg, action, canvas, ctx } = ui;
      let score = 0, best = currentBest, shotsLeft = 0, running = false, raf = null;
      let angle = 0, angDir = 1;
      let stone = null;
      let target = { x: W * 0.7, y: H * 0.3, vx: 1.4, vy: 0.9, r: 22 };

      function reset() {
        score = 0; shotsLeft = 10;
        scoreEl.textContent = 0;
        msg.textContent = "Tap to fire stone. 10 shots.";
        running = true;
        target.x = W * 0.7; target.y = H * 0.3;
        target.vx = 1 + Math.random() * 1.4; target.vy = 0.6 + Math.random() * 1;
        loop();
      }

      function launcherX() { return 60; }
      function launcherY() { return H - 60; }

      function loop() {
        if (!running) return;
        ctx.clearRect(0, 0, W, H);

        angle += angDir * 0.04;
        if (angle > 1.2 || angle < 0.1) angDir *= -1;

        // launcher
        ctx.strokeStyle = "#e8d49a";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(launcherX() - 8, launcherY() + 20);
        ctx.lineTo(launcherX() - 8 + Math.cos(angle) * 40, launcherY() + 20 - Math.sin(angle) * 40);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(launcherX() + 8, launcherY() + 20);
        ctx.lineTo(launcherX() + 8 + Math.cos(angle) * 40, launcherY() + 20 - Math.sin(angle) * 40);
        ctx.stroke();
        ctx.fillStyle = "#ffd870";
        ctx.beginPath();
        ctx.arc(launcherX(), launcherY() + 20 - 8, 7, 0, Math.PI * 2);
        ctx.fill();

        // target
        target.x += target.vx;
        target.y += target.vy;
        if (target.x < target.r + 100 || target.x > W - target.r) target.vx *= -1;
        if (target.y < target.r + 10 || target.y > H - 100) target.vy *= -1;
        ctx.fillStyle = "#e84040";
        ctx.beginPath();
        ctx.arc(target.x, target.y, target.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff8e0";
        ctx.lineWidth = 2;
        ctx.stroke();

        // stone
        if (stone) {
          stone.x += stone.vx;
          stone.y += stone.vy;
          stone.vy += 0.2;
          ctx.fillStyle = "#c8c8c8";
          ctx.beginPath();
          ctx.arc(stone.x, stone.y, 6, 0, Math.PI * 2);
          ctx.fill();
          const d = Math.hypot(stone.x - target.x, stone.y - target.y);
          if (d < target.r + 6) {
            score += 10;
            scoreEl.textContent = score;
            stone = null;
            msg.textContent = "Hit! +10";
            target.x = 100 + Math.random() * (W - 200);
            target.y = 30 + Math.random() * (H * 0.4);
          } else if (stone.y > H || stone.x > W) {
            stone = null;
            msg.textContent = "Miss";
          }
        }

        raf = requestAnimationFrame(loop);
      }

      function fire() {
        if (!running || stone || shotsLeft <= 0) return;
        const sp = 11;
        stone = {
          x: launcherX(),
          y: launcherY() + 20 - 8,
          vx: Math.cos(angle) * sp,
          vy: -Math.sin(angle) * sp - 1
        };
        shotsLeft--;
        if (shotsLeft === 0) setTimeout(endRun, 1200);
      }

      function endRun() {
        running = false;
        cancelAnimationFrame(raf);
        if (score > best) { best = score; bestEl.textContent = best; }
        msg.textContent = `Run complete. ${score} pts. Tap Reset.`;
        action.textContent = "Reset";
        recordScore("slingshot", score);
      }

      canvas.addEventListener("click", fire);
      canvas.addEventListener("touchstart", (e) => { e.preventDefault(); fire(); }, { passive: false });
      action.addEventListener("click", reset);
      reset();
    }

    // ====================================================================
    // KNIFE — Spinning target wheel. Tap to throw a knife. Avoid hitting
    // existing knives. Score = knives stuck before collision.
    // ====================================================================
    function mountKnife(currentBest) {
      const ui = gameShell({ title: "The Knife", hint: "Tap to throw. Don't hit the other knives.", currentBest });
      let { W, H, score: scoreEl, best: bestEl, msg, action, canvas, ctx } = ui;
      let score = 0, best = currentBest, running = false, raf = null;
      const wheelR = 70;
      let wheel = { x: W / 2, y: H * 0.35, rot: 0, speed: 0.02 };
      let stuck = [];      // angles in wheel-local space
      let inFlight = null; // {y, vy}
      const baseY = H - 50;

      function reset() {
        score = 0; stuck = []; inFlight = null;
        wheel.x = W / 2; wheel.y = H * 0.35; wheel.rot = 0;
        wheel.speed = 0.018 + Math.random() * 0.01;
        scoreEl.textContent = 0;
        msg.textContent = "Tap to throw.";
        running = true;
        loop();
      }

      function loop() {
        if (!running) return;
        wheel.rot += wheel.speed;
        ctx.clearRect(0, 0, W, H);

        // wheel
        ctx.fillStyle = "#8a5a30";
        ctx.beginPath();
        ctx.arc(wheel.x, wheel.y, wheelR, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#3a1a08";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = "#ffd870";
        ctx.beginPath();
        ctx.arc(wheel.x, wheel.y, 8, 0, Math.PI * 2);
        ctx.fill();

        // stuck knives
        for (const a of stuck) {
          const ang = a + wheel.rot;
          const kx = wheel.x + Math.cos(ang) * wheelR;
          const ky = wheel.y + Math.sin(ang) * wheelR;
          ctx.save();
          ctx.translate(kx, ky);
          ctx.rotate(ang + Math.PI / 2);
          drawKnife();
          ctx.restore();
        }

        // ground knife (ready to throw)
        if (!inFlight) {
          ctx.save();
          ctx.translate(W / 2, baseY);
          drawKnife();
          ctx.restore();
        }

        // in-flight knife
        if (inFlight) {
          inFlight.y += inFlight.vy;
          inFlight.vy += 0.05;
          ctx.save();
          ctx.translate(W / 2, inFlight.y);
          drawKnife();
          ctx.restore();
          // check arrival at wheel
          const distToWheel = wheel.y + wheelR - inFlight.y;
          if (distToWheel <= 0) {
            const localAng = -Math.PI / 2 - wheel.rot;
            // collision check
            for (const a of stuck) {
              const diff = Math.atan2(Math.sin(a - localAng), Math.cos(a - localAng));
              if (Math.abs(diff) < 0.22) {
                inFlight = null;
                return endRun();
              }
            }
            stuck.push(localAng);
            score++;
            scoreEl.textContent = score;
            msg.textContent = `${score} stuck.`;
            wheel.speed *= 1.06; // accelerate slightly
            inFlight = null;
          }
        }

        raf = requestAnimationFrame(loop);
      }
      function drawKnife() {
        ctx.fillStyle = "#dcdcdc";
        ctx.beginPath();
        ctx.moveTo(-3, 0);
        ctx.lineTo(3, 0);
        ctx.lineTo(0, -28);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#3a2510";
        ctx.fillRect(-4, 0, 8, 14);
      }
      function endRun() {
        running = false;
        cancelAnimationFrame(raf);
        if (score > best) { best = score; bestEl.textContent = best; }
        msg.textContent = `Collision. ${score} stuck. Tap Reset.`;
        action.textContent = "Reset";
        recordScore("knife", score);
      }
      function throwKnife() {
        if (!running || inFlight) return;
        inFlight = { y: baseY, vy: -10 };
      }

      canvas.addEventListener("click", throwKnife);
      canvas.addEventListener("touchstart", (e) => { e.preventDefault(); throwKnife(); }, { passive: false });
      action.addEventListener("click", reset);
      reset();
    }

    // ====================================================================
    // NET — Catch falling items by dragging the net left-right. 30-sec run.
    // Score = total caught item value.
    // ====================================================================
    function mountNet(currentBest) {
      const ui = gameShell({ title: "The Net", hint: "Drag the net. Catch the loot.", currentBest });
      let { W, H, score: scoreEl, best: bestEl, msg, action, canvas, ctx } = ui;
      let score = 0, best = currentBest, running = false, raf = null;
      let net = { x: W / 2, w: 70 };
      let items = [];
      let timeLeft = 30, lastTick = 0;
      const itemKinds = [
        { c: "#ffd870", v: 5,  rare: 1 },
        { c: "#86e870", v: 3,  rare: 0.6 },
        { c: "#e84040", v: -3, rare: 0.3 } // sabotage
      ];

      function reset() {
        score = 0; items = []; timeLeft = 30;
        net.x = W / 2;
        scoreEl.textContent = 0;
        msg.textContent = "30 sec. Drag the net.";
        running = true;
        lastTick = performance.now();
        loop();
      }

      function spawn() {
        if (Math.random() < 0.05) {
          const k = itemKinds[Math.floor(Math.random() * itemKinds.length)];
          items.push({ x: 20 + Math.random() * (W - 40), y: -10, vy: 2 + Math.random() * 2, kind: k });
        }
      }

      function loop() {
        if (!running) return;
        const now = performance.now();
        if (now - lastTick > 1000) {
          timeLeft -= Math.floor((now - lastTick) / 1000);
          lastTick = now;
          if (timeLeft <= 0) return endRun();
        }
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#fff8e0";
        ctx.font = "14px monospace";
        ctx.fillText(`${timeLeft}s`, W - 40, 20);

        spawn();
        const netY = H - 30;
        for (const it of items) it.y += it.vy;
        for (let i = items.length - 1; i >= 0; i--) {
          const it = items[i];
          // draw
          ctx.fillStyle = it.kind.c;
          ctx.beginPath();
          ctx.arc(it.x, it.y, 10, 0, Math.PI * 2);
          ctx.fill();
          if (it.y > netY && Math.abs(it.x - net.x) < net.w / 2) {
            score += it.kind.v;
            scoreEl.textContent = score;
            items.splice(i, 1);
          } else if (it.y > H + 20) {
            items.splice(i, 1);
          }
        }
        // net
        ctx.fillStyle = "#3a2510";
        ctx.fillRect(net.x - net.w / 2, netY, net.w, 14);
        ctx.strokeStyle = "#ffd870";
        ctx.lineWidth = 2;
        ctx.strokeRect(net.x - net.w / 2, netY, net.w, 14);

        raf = requestAnimationFrame(loop);
      }

      function endRun() {
        running = false;
        cancelAnimationFrame(raf);
        if (score > best) { best = score; bestEl.textContent = best; }
        msg.textContent = `Time. ${score} pts. Tap Reset.`;
        action.textContent = "Reset";
        recordScore("net", score);
      }

      function moveTo(e) {
        if (!running) return;
        const rect = canvas.getBoundingClientRect();
        const t = (e.touches && e.touches[0]) ? e.touches[0] : e;
        const x = t.clientX - rect.left;
        net.x = Math.max(net.w / 2, Math.min(W - net.w / 2, x));
      }
      canvas.addEventListener("mousemove", moveTo);
      canvas.addEventListener("touchmove", (e) => { e.preventDefault(); moveTo(e); }, { passive: false });
      action.addEventListener("click", reset);
      reset();
    }

    // ====================================================================
    // TOWER — Stack-style falling blocks. Tap to drop a sliding block onto
    // the tower. Misalignment = game over. Score = blocks stacked.
    // ====================================================================
    function mountTower(currentBest) {
      const root = document.getElementById("content");
      root.innerHTML = `
        <div class="tower-stage">
          <div style="text-align:center;">
            <h1 class="screen-form__title" style="font-size:clamp(1.5rem,5vw,2.2rem);">The Tower</h1>
            <p style="font-family:var(--font-utility);font-weight:600;font-size:0.85rem;color:#ffe4a0;margin-top:4px;text-shadow:0 1px 0 rgba(0,0,0,0.85);">
              Tap to drop. Land within the block below.
            </p>
          </div>
          <div class="tower-hud">
            <div>Stack: <span class="tower-hud__value" id="tower-score">0</span></div>
            <div>Best: <span class="tower-hud__value" id="tower-best">${currentBest}</span></div>
          </div>
          <canvas class="tower-canvas" id="tower-canvas"></canvas>
          <div class="tower-msg" id="tower-msg">Tap the canvas to drop</div>
          <button class="tower-button" id="tower-action">Start</button>
        </div>
      `;

      const canvas = document.getElementById("tower-canvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("tower-score");
      const bestEl = document.getElementById("tower-best");
      const msgEl = document.getElementById("tower-msg");
      const actionBtn = document.getElementById("tower-action");

      let W = 0, H = 0;
      function resize() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        W = rect.width;
        H = rect.height;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      const BLOCK_H = 24;
      const FLOOR_PAD = 60;
      let stack = []; // {x, w}
      let mover = null; // {x, w, vx}
      let score = 0;
      let best = currentBest;
      let running = false;
      let raf = null;

      function startGame() {
        score = 0;
        scoreEl.textContent = "0";
        msgEl.textContent = "Tap the canvas to drop";
        const baseW = W * 0.6;
        stack = [{ x: (W - baseW) / 2, w: baseW }];
        spawnMover();
        running = true;
        actionBtn.textContent = "Drop";
        loop();
      }

      function spawnMover() {
        const top = stack[stack.length - 1];
        const speed = 2.8 + Math.min(stack.length * 0.18, 5);
        mover = { x: 0, w: top.w, vx: speed, dropping: false, dropY: null };
      }

      function towerTop() {
        return H - FLOOR_PAD - stack.length * BLOCK_H;
      }

      function drawStack() {
        ctx.clearRect(0, 0, W, H);
        // ground line
        ctx.strokeStyle = "rgba(255, 216, 112, 0.3)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, H - FLOOR_PAD + 12);
        ctx.lineTo(W, H - FLOOR_PAD + 12);
        ctx.stroke();

        // stacked blocks
        for (let i = 0; i < stack.length; i++) {
          const b = stack[i];
          const y = H - FLOOR_PAD - (i + 1) * BLOCK_H;
          const hue = 40 + (stack.length - i) * 3;
          ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
          ctx.fillRect(b.x, y, b.w, BLOCK_H);
          ctx.strokeStyle = "rgba(0,0,0,0.55)";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(b.x + 0.5, y + 0.5, b.w - 1, BLOCK_H - 1);
        }

        if (mover) {
          const y = mover.dropping ? mover.dropY : towerTop();
          ctx.fillStyle = "#ffd870";
          ctx.fillRect(mover.x, y, mover.w, BLOCK_H);
          ctx.strokeStyle = "rgba(0,0,0,0.7)";
          ctx.strokeRect(mover.x + 0.5, y + 0.5, mover.w - 1, BLOCK_H - 1);
        }
      }

      function loop() {
        if (!running) return;
        if (mover) {
          if (!mover.dropping) {
            mover.x += mover.vx;
            if (mover.x + mover.w > W) {
              mover.x = W - mover.w;
              mover.vx *= -1;
            } else if (mover.x < 0) {
              mover.x = 0;
              mover.vx *= -1;
            }
          } else {
            const targetY = towerTop();
            mover.dropY = Math.min(targetY, mover.dropY + 18);
            if (mover.dropY >= targetY) {
              landBlock();
            }
          }
        }
        drawStack();
        raf = requestAnimationFrame(loop);
      }

      function dropBlock() {
        if (!running || !mover || mover.dropping) return;
        mover.dropping = true;
        mover.dropY = -BLOCK_H;
      }

      function landBlock() {
        const top = stack[stack.length - 1];
        const left = Math.max(mover.x, top.x);
        const right = Math.min(mover.x + mover.w, top.x + top.w);
        const overlap = right - left;

        if (overlap < 6) {
          gameOver();
          return;
        }

        // Trim mover to overlap (Stack-game classic)
        stack.push({ x: left, w: overlap });
        score = stack.length - 1;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
        }
        dingBell({ volume: 0.06 });
        spawnMover();
      }

      function gameOver() {
        running = false;
        cancelAnimationFrame(raf);
        msgEl.textContent = `Stack of ${score}. Tap Start to try again.`;
        actionBtn.textContent = "Start";
        submitWeaponScore({ slug: tribute.slug, weapon: "tower", score, week: WEEK })
          .then(() => { /* recorded */ })
          .catch(err => console.error("Score submit failed:", err));
      }

      actionBtn.addEventListener("click", () => {
        if (!running) startGame();
        else dropBlock();
      });
      canvas.addEventListener("click", () => {
        if (running) dropBlock();
      });
      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (running) dropBlock();
      }, { passive: false });

      window.addEventListener("resize", () => {
        resize();
        drawStack();
      });
      resize();
      drawStack();
    }

    ensureAudioReady();
    run().catch(err => {
      console.error(err);
      renderEmpty("Transmission error — check console.");
    });
  </script>
</body>
</html>
