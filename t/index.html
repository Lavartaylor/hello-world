<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Reaping Notice — 75th Hunger Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@400;700;900&family=Special+Elite&family=IM+Fell+English:ital@0;1&family=Barlow+Condensed:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/components.css">
  <style>
    /* Cover (closed-letter) content */
    .letter__cover {
      text-align: center;
      padding: var(--sp-5) 0 var(--sp-3);
      transition: opacity var(--dur-med) var(--ease-out);
    }
    .letter__cover-line {
      font-family: var(--font-artifact);
      font-style: italic;
      font-size: var(--fs-md);
      color: #3a2510;
      margin: 0 0 var(--sp-3);
      letter-spacing: 0.02em;
    }
    .letter__cover-line--small {
      font-family: var(--font-utility);
      font-style: normal;
      text-transform: uppercase;
      font-size: var(--fs-xs);
      color: #5a3a18;
      letter-spacing: 0;
      font-weight: 500;
    }
    .letter.is-open .letter__cover { opacity: 0; pointer-events: none; }
  </style>
</head>
<body data-role="tribute">

  <main class="stage">

    <!-- Folded sealed letter — tap anywhere to break the seal -->
    <div class="letter" id="letter" role="button" tabindex="0" aria-label="Break the seal and open the reaping notice">
      <div class="letter__paper">
        <!-- Cover (visible while sealed) -->
        <div class="letter__cover">
          <p class="letter__cover-line">For the eyes of the named recipient.</p>
          <p class="letter__cover-line letter__cover-line--small">Tampering will be reported to the Peacekeepers.</p>
        </div>
        <p class="letter__cover-hint">— tap to break the seal —</p>

        <!-- Inside (revealed on open) -->
        <div class="letter__inside">
          <article class="artifact" id="artifact">
            <div class="artifact__seal" id="seal-slot">
              <!-- District seal injected here -->
            </div>
            <h1 class="artifact__heading" id="heading"></h1>
            <p class="artifact__subheading" id="subheading"></p>
            <div class="artifact__body" id="body"></div>
            <div id="reveal-slot" hidden>
              <span class="artifact__name" id="name-line"></span>
              <span class="artifact__district" id="district-line">
                <small>OF DISTRICT</small>
                <span id="district-num"></span>
              </span>
              <div class="artifact__signoff" id="signoff"></div>
            </div>
            <div style="text-align:center">
              <button class="continue" id="continue" type="button">Acknowledge ▸</button>
            </div>
          </article>
        </div>
      </div>

      <!-- Wax seal pinned over the fold -->
      <div class="letter__seal letter__seal--placeholder" id="wax-seal" aria-hidden="true">C</div>
    </div>

    <!-- Lost-tribute fallback -->
    <article class="artifact" id="not-found" hidden>
      <h1 class="artifact__heading">Unrecognized Identifier</h1>
      <p class="artifact__subheading">This terminal does not match Capitol records.</p>
      <div class="artifact__body" style="text-align:center">
        <p>If you believe this is an error, present yourself to the Gamemakers.</p>
      </div>
    </article>
  </main>

  <script type="module">
    import { typeInto } from "/scripts/typewriter.js";
    import { unlockAudio, dingBell } from "/scripts/audio.js";
    import { jitterChars } from "/scripts/jitter.js";
    import { loadTributes, getSlug, findTribute, districtName } from "/scripts/data.js";

    const DISTRICT_SEAL_URL = (n) => `/assets/seals/district-${n}.svg`;

    async function fetchInlineSVG(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.text();
      } catch { return null; }
    }

    async function injectSVG(target, url) {
      const svg = await fetchInlineSVG(url);
      if (svg) target.innerHTML = svg;
    }

    function ordinal(n) {
      const s = ["th","st","nd","rd"], v = n % 100;
      return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function run() {
      const data = await loadTributes();
      const slug = getSlug();
      const tribute = findTribute(data, slug);
      const letterEl = document.getElementById("letter");
      const notFoundEl = document.getElementById("not-found");

      if (!tribute) {
        letterEl.style.display = "none";
        notFoundEl.hidden = false;
        return;
      }

      // Theme
      document.body.dataset.role = tribute.role || "tribute";

      // Detect a real wax-seal PNG; otherwise keep the CSS placeholder
      try {
        const res = await fetch("/assets/wax-seal.png", { method: "HEAD" });
        if (res.ok) {
          const seal = document.getElementById("wax-seal");
          seal.classList.add("letter__seal--png");
          seal.classList.remove("letter__seal--placeholder");
          seal.textContent = "";
        }
      } catch {}

      // Tap to break the seal
      const open = () => {
        unlockAudio();
        letterEl.classList.add("is-open");
        // The bottom flap "drops down" — wait for that motion before typing
        setTimeout(() => startSequence(tribute, data), 1100);
      };
      letterEl.addEventListener("click", open, { once: true });
      letterEl.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
      }, { once: true });
    }

    async function startSequence(tribute, data) {
      // District seal at the top of the opened letter
      const districtSealUrl = DISTRICT_SEAL_URL(tribute.district);
      injectSVG(document.getElementById("seal-slot"), districtSealUrl);

      const heading = document.getElementById("heading");
      const subheading = document.getElementById("subheading");
      const body = document.getElementById("body");
      const reveal = document.getElementById("reveal-slot");
      const nameLine = document.getElementById("name-line");
      const districtNum = document.getElementById("district-num");
      const signoff = document.getElementById("signoff");
      const cont = document.getElementById("continue");

      await new Promise(r => typeInto(heading, "BY ORDER OF THE CAPITOL", {
        speed: 95, jitter: 30, ding: false, onDone: r
      }));
      dingBell();
      await wait(500);

      await new Promise(r => typeInto(subheading, "75TH ANNUAL HUNGER GAMES  ·  REAPING NOTICE", {
        speed: 60, jitter: 25, ding: false, onDone: r
      }));
      await wait(800);

      const body1 = `By edict of the Gamemakers, and in accordance with the Treaty of the Treason, the following citizen has been selected to represent their district in the [d]${ordinal(75)}[/d] Annual Hunger Games:`;
      await new Promise(r => typeInto(body, body1, {
        speed: 55, jitter: 28, sentencePause: 450, onDone: r
      }));
      await wait(900);

      reveal.hidden = false;
      nameLine.textContent = "";
      await new Promise(r => typeInto(nameLine, tribute.name.toUpperCase(), {
        speed: 180, jitter: 60, sentencePause: 0, onDone: r
      }));
      jitterChars(nameLine, { maxRot: 4, maxShift: 1.8, maxScale: 0.05 });
      dingBell();
      await wait(700);

      districtNum.textContent = String(tribute.district);
      jitterChars(districtNum, { maxRot: 5, maxShift: 2.5, maxScale: 0.08 });
      await wait(600);

      const sig = `\nMay the odds be ever in your favor.\n— The Gamemakers`;
      await new Promise(r => typeInto(signoff, sig, {
        speed: 70, jitter: 28, ding: false, onDone: r
      }));

      await wait(400);
      cont.classList.add("is-ready");
      cont.addEventListener("click", () => {
        cont.disabled = true;
        cont.textContent = "Standing by…";
      });
    }

    run().catch(err => {
      console.error(err);
      document.getElementById("letter").style.display = "none";
      document.getElementById("not-found").hidden = false;
    });
  </script>
</body>
</html>
